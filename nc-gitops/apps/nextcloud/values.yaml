nextcloud:
  host: nc.tracexit.com
  # This tells Nextcloud it's behind a proxy so it generates https:// links correctly
  configs:
    proxy.config.php: |-
      <?php
      $CONFIG = array (
        'trusted_proxies' => array('192.168.20.110'), # The Internal IP of your Nginx VM
        'overwriteprotocol' => 'https',
      );

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: traefik
    # Traefik-specific: allow long-running connections for Nextcloud sync
    traefik.ingress.kubernetes.io/router.entrypoints: web 
  hosts:
    - host: nc.tracexit.com
      paths:
        - path: /
          pathType: Prefix