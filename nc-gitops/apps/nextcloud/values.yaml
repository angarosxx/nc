# 1. PostgreSQL remains the same
postgresql:
  enabled: true
  auth:
    database: nctracex
    username: ncusr
    password: 'DSF29jha64'

nextcloud:
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: nc.tracexit.com
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80
  objectStore:
    enabled: false 

  # Force the installation via Environment Variables
  extraEnv:
    - name: NEXTCLOUD_ADMIN_USER
      value: "admin"
    - name: NEXTCLOUD_ADMIN_PASSWORD
      value: "SetYourStrongPasswordHere"
    - name: OBJECTSTORE_S3_BUCKET
      value: "nextcloud"
    - name: OBJECTSTORE_S3_HOST
      value: "minio.minio.svc.cluster.local"
    - name: OBJECTSTORE_S3_PORT
      value: "9000"
    - name: OBJECTSTORE_S3_KEY
      value: "rfibb9ivKUwQA7AxwPVD"
    - name: OBJECTSTORE_S3_SECRET
      value: "p98m97807cch4KhuhjefjJjQhy4w8wV26OWs2v8E"
    - name: OBJECTSTORE_S3_REGION
      value: "us-east-1"
    - name: OBJECTSTORE_S3_SSL
      value: "false"
    - name: OBJECTSTORE_S3_USEPATH_STYLE
      value: "true"

  configs:
    # This is the "Magic" file. Nextcloud loads all files in /config/
    # We name it with '00-' to ensure it loads FIRST.
    00-primary-s3.config.php: |-
      <?php
      $CONFIG = array (
        'objectstore' => array(
          'class' => '\\OC\\Files\\ObjectStore\\S3',
          'arguments' => array(
            'bucket' => 'nextcloud',
            'autocreate' => true,
            'key'    => 'rfibb9ivKUwQA7AxwPVD',
            'secret' => 'p98m97807cch4KhuhjefjJjQhy4w8wV26OWs2v8E',
            'hostname' => 'minio.minio.svc.cluster.local',
            'port' => 9000,
            'use_ssl' => false,
            'region' => 'us-east-1',
            'use_path_style'=> true
          ),
        ),
      );
    proxy.config.php: |-
      <?php
      $CONFIG = array (
        'trusted_proxies' => array('192.168.20.110'),
        'overwriteprotocol' => 'https',
        'trusted_domains' => array('nc.tracexit.com'),
        'overwrite.cli.url' => 'https://nc.tracexit.com',
      );

# 3. Temporarily DISABLE Probes to let the install finish
livenessProbe:
  enabled: false
readinessProbe:
  enabled: false