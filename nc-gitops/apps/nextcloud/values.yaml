# 1. Disable the internal Postgres bundled with the chart
postgresql:
  enabled: false

# 2. Point to your new AlmaLinux VM
nextcloud:
  externalDatabase:
    enabled: true
    type: postgresql
    host: 192.168.20.120  # Your VM IP
    database: nctracex
    user: ncusr
    password: 'DSF29jha64'
    port: 5432

  # Your Admin credentials for the dashboard
  extraEnv:
    - name: NEXTCLOUD_ADMIN_USER
      value: "admin"
    - name: NEXTCLOUD_ADMIN_PASSWORD
      value: "DSF11jha64"

  # 3. Ingress (Ensure this matches your previous working setup)
  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: web
    hosts:
      - host: nc.tracexit.com
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port:
                  number: 80